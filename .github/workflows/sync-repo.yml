name: Sync develop branch to Vendor Repo

on:
  workflow_dispatch:

  push:
    branches:
      - develop
jobs:
  sync-to-vendor:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.VENDOR_APP_ID }}
          private-key: ${{ secrets.VENDOR_APP_PRIVATE_KEY }}
          owner: guptadiya
          repositories: sync-test-prod

      - name: Configure Git identity
        run: |
          git config --global user.name "repo-sync-bot"
          git config --global user.email "repo-sync-bot@users.noreply.github.com"
          
      - name: Configure vendor remote
        env:
          TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          git remote remove vendor || true

          git remote add vendor "https://x-access-token:${TOKEN}@github.com/guptadiya/sync-test-prod.git"

      - name: Configure GitHub authentication
        env:
          TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
      
          git config --global http.https://github.com/guptadiya/sync-test-prod.git.extraheader \
          "AUTHORIZATION: basic $(echo -n x-access-token:${TOKEN} | base64)"
    
      - name: Create sync branch from vendor develop
        run: |
          BRANCH_NAME=sync-develop-${{ github.run_id }}-${{ github.run_attempt }}
      
          git fetch vendor develop
      
          git checkout -b $BRANCH_NAME vendor/develop
      
          git remote rename origin source
      
          git fetch source
      
          git merge source/develop --allow-unrelated-histories -m "Sync source develop branch"
      
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Remove internal workflow file
        run: |
          rm -f .github/workflows/sync-repo.yml
      
          git add .github/workflows/sync-repo.yml || true
      
          git commit -m "Remove internal workflow before vendor sync" || true
      
      - name: Push sync branch to vendor repo
        run: |
          git push vendor $BRANCH_NAME

      - name: Create Pull Request in vendor repo
        env:
          TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/guptadiya/sync-test-prod/pulls \
            -d "{
              \"title\":\"Sync develop branch changes\",
              \"head\":\"${BRANCH_NAME}\",
              \"base\":\"develop\",
              \"body\":\"Automated PR created from source repository workflow.\"
            }"

      - name: Enable Auto Merge
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          gh pr merge $BRANCH_NAME \
            --repo guptadiya/sync-test-prod \
            --squash \
            --auto
